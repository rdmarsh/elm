# ---
# Audit / Logs
# ---
AuditLogList:
  path: /setting/accesslogs
  unique_options:
    format: "--format TEXT — LM API format param; DO NOT USE — causes JSONDecodeError when set to csv (API returns raw CSV that elm cannot parse); use elm's global --format flag instead"
  gotchas:
    - "username field contains the raw access_id string from the calling integration.
      If you see username: \"(update)\", that is literally the access_id someone configured
      — LM does not substitute or redact deleted tokens. Use the ip field and description
      to identify the source:
        elm AuditLogList -F 'username:(update)' -s0"
    - "NOT operators (!: and !~) are silently broken on this endpoint — elm constructs
      and sends the correct URL but the API returns results from an unexpected time window
      rather than applying the exclusion. Use positive operators (: and ~) and filter
      client-side with jq for exclusions:
        elm -f json AuditLogList -s0 | jq '.AuditLogList[] | select(.username != \"foo\")'"
    - "Max 1000 records. Without a filter you get the 1000 most recent; with a positive
      filter (~, :) you get up to 1000 matching records from the full history."
  key_fields:
    id:             integer
    username:       string
    ip:             string
    description:    string
    happenedOn:     integer # epoch seconds
    happenedOnLocal: string # human-readable local time string

# ---
# Device-scoped commands (require --deviceId or similar)
# ---
DeviceDatasourceList:
  path: /device/devices/{deviceId}/devicedatasources
  required_params:
    deviceId: integer # device ID
  key_fields:
    id:          integer # device-datasource ID (hdsId for sub-commands)
    dataSourceId: integer
    dataSourceName: string
    instanceNumber: integer
    alertStatus: string # "none", "warn", "error", "critical"
  finding_active_datasources: |
    Two ways to answer "which datasources are active on this device". They are
    NOT equivalent — pick based on what's available on the portal.

    1. STANDARD (always works, API-native, authoritative):
       Lists the device-datasources LM has actually matched/applied to the device.
         elm DeviceDatasourceList --deviceId <id> -s0 -f dataSourceName,instanceNumber
       - Always available on any portal; no setup required.
       - Authoritative — this is LM's own record of applied datasources.
       - Returns structured rows (one per applied datasource), so it's filterable
         (-F), sortable (-S), and countable (-C).

    2. NON-STANDARD (only if the 'DataSources_List' PropertySource is applied):
       Reads a single auto property that the PropertySource populates with a flat,
       comma-separated list of active datasource names.
         elm DeviceById --id <id> -f autoProperties \
           | jq -r '.DeviceById[0].autoProperties[]
                    | select(.name=="auto.activedatasources").value'
       - Property name is auto.activedatasources (NOTE: "active", not
         "activated" — easy to get wrong and get an empty result).
       - Only exists on devices where the 'DataSources_List' PropertySource is
         assigned and has run. Absent everywhere else — do not rely on it for
         cross-portal work without checking first.
       - Value is a single comma-separated string. Some names contain spaces
         (e.g. "CPU Cores-", "System Level IP Stats-") and some end in a trailing
         dash, so split on ',' ONLY, never on whitespace.
       - Convenience/reporting shortcut, not authoritative — it reflects the
         applied set as of the PropertySource's last run. PropertySources run on
         a 24-hour cycle, so this value can be up to ~24h stale: a datasource
         added/removed since the last run won't show until the next run. When you
         need the live applied set, use DeviceDatasourceList instead.

    Rule of thumb: use DeviceDatasourceList for anything programmatic or
    cross-portal; the auto.activedatasources property is a quick human-readable
    glance that only exists where the PropertySource is deployed (e.g. sandbox).

DeviceDatasourceInstanceList:
