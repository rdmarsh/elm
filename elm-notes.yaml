# ---
# Collector commands
# ---
CollectorList:
  path: /setting/collector/collectors
  note: "Standard list command; no unique options. Key fields verified via live test."
  key_fields:
    id:                 integer
    description:        string   # human label; often mirrors hostname e.g. "DOMAIN\HOSTNAME"
    hostname:           string   # frequently "DOMAIN\HOSTNAME" or an FQDN, NOT a bare hostname
    platform:           string   # "linux" or "windows"
    arch:               string   # "Linux64", "Win64"
    build:              string   # e.g. "38001"; compare against CollectorVersionList for upgrade status
    status:             integer  # 1=registered/present (not a health indicator; isDown is authoritative)
    collectorSize:      string   # nano/small/medium/large/extra_large/double_extra_large/custom
    collectorGroupId:   integer
    collectorGroupName: string
    collectorDeviceId:  integer  # device ID of the collector host in LM; 0 = no device registered (no host-level metrics)
    numberOfHosts:      integer
    numberOfInstances:  integer  # only meaningful for auto-balance groups; 0 for non-auto-balance
    numberOfWebsites:   integer
    isDown:             boolean
    inSDT:              boolean
    upTime:             integer  # seconds since last agent start
    backupAgentId:      integer  # 0 = no failover; non-zero = ID of backup collector
    enableFailBack:     boolean  # true = devices auto-return to primary when it recovers
    calculatedThreshold: float   # current load vs autoBalanceInstanceCountThreshold; only non-zero for auto-balance groups
    acked:              boolean  # down alert has been acknowledged
    nextUpgradeInfo:    object   # {majorVersion, minorVersion, mandatory, stable, upgradeTime, upgradeTimeEpoch}
  gotchas:
    - "collectorDeviceId=0 means the collector has no device record in LM -- you cannot query its host metrics (CPU, memory) via DeviceDatasourceInstanceData etc."
    - "collectorDeviceId (when non-zero) is the device ID of the collector host in DeviceList -- use it to identify which devices in a group are themselves collector hosts so reachability/cross-collector checks can skip them (a collector is monitored from itself; collector name and device name need not match)"
    - "Collector Debug / remote debug operations (running a Groovy/!groovy command on a collector, e.g. via the Logic.Monitor PS module Invoke-LMCollectorDebugCommand) require a Manage-level token; a read-only token returns 'Access denied. Your API credentials do not have sufficient permissions.' (same class as CollectorStatusCheck returning 403 read-only)"
    - "hostname and description are usually the 'DOMAIN\\HOSTNAME' form (e.g. 'CORP\\NEWEDGE03') or an FQDN, not the bare host label -- matching a collector by an exact bare name fails. Match by numeric id, or substring/partial. The tools/lm-collector-reachability-run-all.ps1 -Candidate flag resolves id -> exact hostname/description -> unambiguous substring for this reason."
    - "tools/lm-collector-reachability-run-all.ps1 -Candidate <id|name> tests a collector NOT yet in a group against that group's device list (pre-add vetting): submits the group's device list to the candidate via Collector Debug and reports device+protocol combos the candidate fails to reach but an in-group collector does. Requires the candidate to already be installed and connected to LM (just not in the group)."
    - "status is always 1 for all collectors including DOWN ones -- use isDown for real health status"
    - "numberOfInstances is 0 for non-auto-balance collectors -- it only tracks auto-balance load distribution"
    - "backupAgentId is a single value -- a collector can only have one backup; no chain failover"
    - "enableFailBack only takes effect if backupAgentId is set; harmless but meaningless when 0"
  patterns:
    all_collectors_health: |
      # Full health overview sorted by worst first (DOWN + most hosts = most urgent)
      elm CollectorList -s0 -f id,hostname,isDown,numberOfHosts,numberOfInstances,build,backupAgentId,enableFailBack,collectorGroupName,collectorSize,collectorDeviceId
    down_with_hosts: |
      # DOWN collectors that still have hosts attached (devices are unmonitored)
      elm CollectorList -s0 -F 'isDown:true' -f id,hostname,numberOfHosts,build,backupAgentId,collectorGroupName
    no_backup: |
      # Collectors with hosts but no backup (single point of failure)
      # No direct API filter for backupAgentId:0 -- pipe through jq
      elm CollectorList -s0 -f id,hostname,isDown,numberOfHosts,backupAgentId,collectorGroupName | \
        jq '.CollectorList[] | select(.backupAgentId == 0 and .numberOfHosts > 0)'
    old_builds: |
      # Collectors below a build threshold -- replace 38000 with your minimum acceptable build
      elm -f csv CollectorList -s0 -f id,hostname,isDown,numberOfHosts,build,collectorGroupName -F 'build<:38000' -S build

CollectorById:
  path: /setting/collector/collectors/{id}
  required_params:
    id: integer
  note: "Returns same fields as CollectorList plus predefinedConfig (size profiles) and full conf fields. predefinedConfig is large -- use -f to exclude if not needed."
  key_fields:
    id:                 integer
    description:        string
    build:              string
    collectorGroupId:   integer
    collectorGroupName: string
    collectorDeviceId:  integer
    hostname:           string
    platform:           string
    collectorSize:      string   # nano/small/medium/large/extra_large/double_extra_large/custom
    numberOfHosts:      integer
    numberOfInstances:  integer
    isDown:             boolean
    upTime:             integer
    backupAgentId:      integer
    enableFailBack:     boolean
    calculatedThreshold: float
    confVersion:        string   # Unix timestamp updated regularly by the collector (heartbeat/sync tick); does NOT indicate when config was last changed -- use userChangeOn for that
    userChangeOn:       integer  # Unix timestamp of last user-initiated change to this collector (portal config push, property edit, etc)
    collectorConf:      string   # JSON-encoded agent.conf overrides set via API; '{}' means no API-managed overrides
    wrapperConf:        string   # JSON-encoded wrapper.conf overrides set via API; '{}' means no API-managed overrides
    sbproxyConf:        string   # JSON-encoded sbproxy.conf overrides set via API
    watchdogConf:       string   # JSON-encoded watchdog.conf overrides set via API
    websiteConf:        string   # JSON-encoded website.conf overrides set via API
    agentConfFields:    object   # structured parsed version of agent.conf overrides; null if none set via API
    predefinedConfig:   object   # size profiles (nano..double_extra_large) with requiredMemory and agent.conf/wrapper.conf/sbproxy.conf keys; no 'custom' entry
  gotchas:
    - "All conf fields (collectorConf, wrapperConf, sbproxyConf, watchdogConf, websiteConf, agentConfFields, predefinedConfig, confVersion, config, encodedConfigData) are marked readOnly in the swagger schema. Collector configuration is READ-ONLY via the REST API -- you cannot push config changes through the API."
    - "The LM portal 'Collector Configuration' UI uses a separate internal channel to push config to the collector agent. This is NOT the public REST API."
    - "collectorConf and related conf fields return '{}' (string-encoded empty JSON) even after portal UI changes -- they do not reflect what was pushed."
    - "confVersion updates when the portal pushes a config, even though collectorConf stays '{}'. confVersion being non-zero does not mean the config is readable via API."
    - "collectorSize 'custom' means the collector was tuned outside the standard profiles. predefinedConfig has no 'custom' key."
    - "To read or change the actual running config, you need direct host access (SSH/RDP) or the portal UI. There is no API path for either operation."

CollectorGroupById:
  path: /setting/collector/groups/{id}
  required_params:
    id: integer
  note: "collector group for a specific host; get id from CollectorList.collectorGroupId"
  key_fields:
    id:                integer
    name:              string
    description:       string
    numOfCollectors:   integer
    numOfHosts:        integer
    numOfInstances:    integer
    autoBalance:       boolean
    platform:          string

CollectorGroupList:
  path: /setting/collector/groups
  note: "Standard list; no unique options. Verified via live test."
  auto_balance_explained: |
    When autoBalance=true, LM automatically redistributes devices between collectors in the
    group as instance counts change. Key mechanics:

    THE DEVICE FIELD THAT MATTERS:
    - DeviceList.autoBalancedCollectorGroupId controls whether a specific device participates:
        0         = device is pinned to its current preferredCollectorId; LM will not move it
        <groupId> = device is in the auto-balance pool; LM may reassign preferredCollectorId
    - autoBalance=true on the group sets the capability; each device opts in/out individually
      via autoBalancedCollectorGroupId. Within one group, some devices can be pinned (0) and
      others pooled (groupId) -- both coexist (verified).
    - Collector host devices should be pinned (autoBalancedCollectorGroupId=0). Monitoring a
      collector from a different collector is pointless: if the collector software is down,
      the device metrics are lost regardless of which collector nominally owns it. Pinning
      keeps the collector device on its own collector at all times.

    GROUP FIELDS:
    - autoBalanceInstanceCountThreshold: max instances per collector before rebalancing triggers
    - autoBalanceStrategy: "none" = LM default; other values undocumented
    - propertyForBalancing: "" = balance by instance count; non-empty = balance by device
      property value (pins devices with the same property value to the same collector)
    - calThreshold mirrors autoBalanceInstanceCountThreshold (same value, different field name)
    - numOfInstances (CollectorGroupById only, not list): total instances across all collectors
      in the group; if > numOfCollectors * threshold the group is over capacity and auto-balance
      cannot fully resolve load -- the group needs more collectors

    SINGLE-COLLECTOR AUTO-BALANCE GROUPS:
    - Valid and intentional. Setting autoBalance=true on a group with one collector means the
      group is pre-configured and ready to distribute load the moment a second collector is
      added -- no group reconfiguration needed at that point.

    LIMITS:
    - If total group load exceeds numOfCollectors * threshold, auto-balance cannot fix it (verified:
      a group with 26k instances across 2 collectors with 10k threshold stays overloaded)
    - In that case the group needs more collectors, not tuning
    - CollectorList.calculatedThreshold: per-collector load score; only non-zero for auto-balance groups
    - CollectorList.numberOfInstances: per-collector instance count; 0 for non-auto-balance collectors
  key_fields:
    id:                integer
    name:              string
    description:       string
    platform:          string   # "linux"/"windows" when autoBalance is on; "n/a" when off (verified)
    numOfCollectors:   integer
    numOfHosts:        integer  # always 0 in list -- CollectorGroupById returns correct count
    numOfInstances:    integer  # always 0 in list -- CollectorGroupById returns correct count (when autoBalance on); 0 in ById when autoBalance off
    autoBalance:       boolean
    autoBalanceStrategy: string  # "none" = LM default; other values undocumented
    autoBalanceInstanceCountThreshold: integer  # 0 when autoBalance is off; max instances before rebalancing triggers
    calThreshold:      integer  # mirrors autoBalanceInstanceCountThreshold (same value)
    propertyForBalancing: string  # "" = balance by instance count; device property name to balance by property value
    mismatchVersion:   boolean  # true if collectors in the group are on different builds
    customProperties:  array
    highestPriorityCollectorStatus: object  # {acked, inSDT, isDown, status} -- status value unreliable in list (verified: 1 in list vs 0 in ById for same group)
    userPermission:    string
  gotchas:
    - "numOfHosts and numOfInstances are always 0 in list response -- use CollectorGroupById for accurate counts (verified with autoBalance both on and off: list always 0, ById shows real values when autoBalance is on)"
    - "numOfInstances in ById is only populated when autoBalance is on -- 0 when off (it tracks load-balanced instance distribution)"
    - "platform shows 'n/a' when autoBalance is off, actual platform string when on"
    - "highestPriorityCollectorStatus.status is unreliable in list response -- consistently disagrees with ById for same group (1 vs 0 for id=64)"
    - "a group with autoBalance=true and numOfCollectors=1 cannot rebalance -- needs 2+ collectors to be useful"
  patterns:
    auto_balance_groups: |
      # List all auto-balance groups with threshold and collector count
      elm CollectorGroupList -s0 -F 'autoBalance:true' -f id,name,autoBalanceInstanceCountThreshold,numOfCollectors,platform,propertyForBalancing
    multi_collector_not_balanced: |
      # Groups with 2+ collectors but auto-balance off (missing rebalancing)
      elm -f txt CollectorGroupList -s0 -F 'autoBalance:false,numOfCollectors>:2' -f id,name,autoBalance,numOfCollectors
    version_mismatch_groups: |
      # Groups where collectors are on different builds
      elm CollectorGroupList -s0 -F 'mismatchVersion:true' -f id,name,mismatchVersion,numOfCollectors

