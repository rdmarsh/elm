    AllLogPartitions:      "/log/partitions — no -s option; returns log partitions with tenant/contract info (verified)"
    AwsAccountId:          "/aws/accountId — returns {accountId: string} (AWS account number) (verified)"
    AwsExternalId:         "/aws/externalId — 403 Forbidden with read-only token (verified)"
    ContractInfoByCompany: "/usage/contractInfo — CSV output broken: column headers are numeric (0,1,2,...) instead of field names; use prettyjson (verified)"
    ExternalApiStats:      "/apiStats/externalApis — returns per-endpoint request stats: totalRequests, totNanoTime, maxNanoTime, api path, tags, summary (verified)"
    LogAlerts:             /logpipelines/processors
    MetricsSummary:        "/metrics/summary — richer than MetricsUsage: includes hostGroupsInfo (dynamic/static group counts + property counts), kubernetes breakdown, numOfSavedMaps; no -s option (verified)"
    MetricsUsage:          /metrics/usage
    PortalInfo:            /setting/companySetting  # same path as CompanySetting; returns portal/account info
    RetentionList:         "/setting/loganalytics/retentions — standard list (-s/-o/-F/-f all work); returns data retention options: {default, value (days), label, isDefault} (verified)"
    V4Metadata:            "/setting/logicmodules/metadata — no -s option; returns nested [[...]] array — CSV output broken (numeric headers); use prettyjson (verified)"
    IntegrationAuditLogs:  "/setting/integrations/auditlogs — unique: --format TEXT (LM API param — see gotcha)"

