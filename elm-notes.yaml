# ---
# Simple ById lookups (--id INTEGER only)
# Pattern: elm <Command> --id <ID>
# ---
_byid_pattern:
  note: "All take a single --id and return one record. IDs come from the corresponding *List command."
  commands:
    AccessGroupById:      /setting/accessgroup/{id}
    AdminById:            /setting/admins/{id}
    AlertRuleById:        /setting/alert/rules/{id}
    AppliesToFunctionById: /setting/functions/{id}
    CollectorGroupById:   /setting/collector/groups/{id}
    CollectorById:        /setting/collector/collectors/{id}
    DashboardById:        /dashboard/dashboards/{id}         # unique: --template BOOL, --format TEXT (LM API)
    DashboardGroupById:   /dashboard/groups/{id}             # unique: --template BOOL, --format TEXT (LM API)
    DiagnosticSourcesById: /setting/diagnosticsources/{id}  # unique: --format TEXT (LM API)
    EscalationChainById:  /setting/alert/chains/{id}
    EventSourceById:      /setting/eventsources/{id}        # unique: --format TEXT (LM API)
    DeviceGroupById:      /device/groups/{id}
    ImmediateDeviceListByDeviceGroupId:  /device/groups/{id}/devices
    ImmediateWebsiteListByWebsiteGroupId: /website/groups/{id}/websites
    JobMonitorById:       /setting/batchjobs/{id}            # unique: --format TEXT (LM API)
    LogAlertGroupById:    /logpipelines/{pipelineId}         # note: param is --pipelineId not --id
    LogAlertsById:        /logpipelines/processors/{processorId}  # note: param is --processorId not --id
    LogQueryGroupById:    /log/logquerygroups/{id}
    NetscanById:          /setting/netscans/{id}
    OidById:              /setting/oids/{id}
    OpsNoteById:          /setting/opsnotes/{id}             # id is string, not integer
