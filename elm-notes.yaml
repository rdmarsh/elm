# elm-notes.yaml
# Hand-curated notes on elm command behaviour, response fields, and filter patterns.
# Supplements the swagger — focuses on what the swagger doesn't tell you:
# real response structure, what filters actually work, and gotchas.
#
# WARNING: This file is partially AI-assisted and may contain inaccuracies.
# Entries should be verified against the live API before being relied upon.
# Correct errors in place and remove this warning from individual entries once verified.
#
# HOW FLAGS ARE GENERATED (important for understanding missing/present options):
#
# The LM swagger incompletely documents query parameters. elm compensates in two ways:
#
# 1. Template injection (_jnja/command.py.j2): --sort/-S and --fields/-f are injected
#    on EVERY command that doesn't already have them declared in the swagger. This means
#    all commands have -f and -S regardless of what the swagger says.
#
# 2. swagger.undocumented.json: overrides _defs/ entries for specific endpoints where
#    the official swagger omits pagination params. Currently covers:
#    - 11 list endpoints missing size/offset/filter (see GitHub issue #47)
#    - IntegrationList (fields/size/offset/filter all missing from official swagger)
#    - PortalInfo (/setting/companySetting — not in official swagger at all)
#    Run `make init` to merge official swagger + undocumented into _defs/.
#
# "Standard list" in a note means -s/-o/-F/-f/-S/-c/-C all work.
# Remaining "no -s" notes are for genuinely non-paginated endpoints
# (single-object responses, sub-path resources, etc.).

# ---
# Output formats
# ---
# Global flag: elm -f <format> <command>
# Verified against: elm -f <fmt> DeviceGroupList -s2 -f id,name
_formats:
  csv:
    description: Comma-separated values with header row
    pipeable: true
    example: "id,name\n1,foo\n2,bar"

  tsv:
    description: True tab-separated values (tab delimiter, no alignment padding)
    pipeable: true
    note: "Distinct from 'tab' which is tabulate's human-readable aligned table. Supports -H and -I flags."
    example: "id\tname\n1\tfoo\n2\tbar"

  json:
    description: Compact JSON wrapped in command name key
    pipeable: true  # pipe to jq
    example: '{"DeviceGroupList": [{"id": 1, "name": "foo"}]}'

  jsonl:
    description: JSON Lines — one JSON object per line, no command-name wrapper
    pipeable: true
    note: "No {CommandName: [...]} wrapper unlike 'json'. Each line is a complete JSON object. Directly readable by DuckDB and jq without preprocessing."
    example: '{"id": 1, "name": "foo"}\n{"id": 2, "name": "bar"}'
    use_for: "Cache files for DuckDB queries; streaming pipelines; tools that expect newline-delimited JSON"

  prettyjson:
    description: Indented colour-highlighted JSON (uses pygments) — same structure as json
    pipeable: true  # colours may interfere; use json for clean piping
    example: "indented + syntax highlighted"

  tab:
    description: Tabulate 'simple' format — headers + separator line + aligned columns
    pipeable: false
    note: "Identical output to md"

  md:
    description: Tabulate 'simple' format — same as tab
    pipeable: false
    note: "Identical output to tab — may be a bug or historical alias"

  txt:
    description: Plain text — headers + aligned columns, no separator line under headers
    pipeable: false

  gfm:
    description: GitHub Flavored Markdown table — pipe-delimited with header separator
    pipeable: false
    example: "| id | name |\n|---|---|\n| 1 | foo |"

  pipe:
    description: Markdown pipe table — like gfm but with right-aligned numbers and left-aligned strings
    pipeable: false

  jira:
    description: Jira wiki markup table
    pipeable: false
    example: "|| id || name ||\n| 1 | foo |"

  html:
    description: Minified HTML table
    pipeable: false

  prettyhtml:
    description: Syntax-highlighted HTML (uses pygments) — for terminal display only
    pipeable: false

  xml:
    description: Compact XML — includes a row index field
    pipeable: false
    note: "Adds an <index> element per row that is not in the source data"

  prettyxml:
    description: Indented XML — same structure as xml
    pipeable: false

  latex:
    description: LaTeX tabular environment
    pipeable: false

  rst:
    description: reStructuredText grid table
    pipeable: false

  raw:
    description: Python dict repr — NOT JSON, cannot pipe to jq
    pipeable: false
    note: "Output is a Python list of dicts e.g. [{'id': 1, 'name': 'foo'}] — not valid JSON"

  api:
    description: Makes the request, then prints the URL and Authorization header instead of the response data
    pipeable: false
    note: "Authorization header contains the HMAC signature — sensitive, do not share output
      or commit it to version control. The header is time-stamped (epoch ms in the third
      colon-separated field) and expires within minutes — run curl immediately after elm -f api.
      The request IS made; response.url is used for the URL output."
    use_for: "Debug exactly what API call elm made, or replay it with curl"
    example: |
      curl -H "Authorization: LMv1 ..." "https://acme.logicmonitor.com/santaba/rest/..."

# ---
# Global notes (apply to all commands)
# ---
_global:
  flags:
    version: "-V/--version — show version and exit"
    list:    "-l/--list — list available credential profiles and exit; active marked with '* '; no credentials required; config.example.ini excluded"
    profile: "-p/--profile NAME — resolve ~/.config/logicmonitor/credentials/<NAME>.ini; strips .ini suffix if included; pre-scanned from sys.argv so --list reflects it correctly"
    config:  "--config PATH — full path to any .ini file; handled by click_config_file; use for credentials outside the default directory"
    format:  "-f/--format FORMAT — output format; must come BEFORE subcommand name"
    size:    "-s/--size INTEGER — results to return [0-1000]; 0 = all up to 1000 [default: 50]"
    access_id:  "-i/--access_id TEXT — override access_id from config file; LM logs this value verbatim as the username field in AuditLogList"
    access_key: "-k/--access_key TEXT — override access_key from config file"
  performance:
    - "Startup (v1.8.0+): --version, --help, --list, and tab-completion load in ~0.2s.
      Command modules (_cmds/) are loaded lazily -- only the invoked command is imported.
      Heavy libraries (pandas, requests, tabulate, pygments) load inside engine()/output()
      so they are only paid when an API call is made."
    - "First run after compilation: macOS Gatekeeper verifies new binaries - expect 10-30s
      once per install. Not worth optimising; steady-state is what matters."
    - "Steady-state API call time is mostly network/LM latency. elm adds ~0.5-1s overhead
      (Python + pandas + JSON + output). Confirmed by timing curl directly against the API:
      all three machines (macOS personal, macOS corporate, Linux) hit the same portal in
      ~0.7s. Earlier slow times on the corporate Mac were against a different portal with
      a less favourable network path from that location -- not a proxy/SSL inspection issue.
      To isolate elm overhead: elm --profile NAME -f api COMMAND -s1 > /tmp/t.txt && curl
      with URL+auth from that file (auth expires in seconds, run steps together)."
  gotchas:
    - "Never use 2>&1 when piping elm output to jq — elm warnings go to stderr and
      will corrupt the JSON stream causing jq parse errors"
    - "Multiple -F flags AND together (fixed in v1.7.10; previously only the last
      -F was sent). Comma-separated in a single -F also works and is equivalent:
        -F 'field1:val1' -F 'field2:val2'  ==  -F 'field1:val1,field2:val2'"
    - "API filter does not support OR across multiple values for the same field —
      use jq client-side for that"
    - "Array fields cannot be filtered for emptiness server-side (no 'is empty'
      operator) — use jq: select(.field | length == 0)"
    - "-s0 means return all records (up to 1000), not zero records"
    - "validate_filter() wraps values in double quotes automatically — do not
      double-quote values in shell, it causes doubling"
    - "--format TEXT on some commands (AuditLogList, ConfigSourceList, DatasourceList,
      EventSourceList, JobMonitorList, LogSourceList, PropertyRulesList) is an LM API-level
      parameter, NOT elm's output format flag. It instructs the LM API to return data in that
      format directly, bypassing elm's output pipeline. Use elm's global --format flag before
      the subcommand for output formatting instead. Known issue: AuditLogList --format csv
      causes a JSONDecodeError because the API returns raw CSV that elm cannot parse."

# ---
# Standard options shared by almost all List commands
# ---
_standard_list_options:
  note: "All *List commands support these unless noted otherwise"
  size:   "-s/--size INTEGER — results to return [0-1000]; 0 means all up to 1000 [default: 50]"
  offset: "-o/--offset INTEGER — skip N records; combine with --size for pagination [default: 0]"
  fields: "-f/--fields FIELD,... — server-side field projection (comma-separated)"
  filter: "-F/--filter FIELD[op]VALUE,... — server-side filter; see operators in --help"
  sort:   "-S/--sort [+,-]FIELD,... — server-side sort; + ascending, - descending"
  count:  "-c/--count — return count of matching records only (respects -F filter)"
  total:  "-C/--total — return count of ALL records regardless of filter"

# ---
# Websites
# ---
WebsiteList:
  path: /website/websites
  unique_options:
    collectorIds: "--collectorIds TEXT — filters websites by collector ID; comma-separated; synthetic collector IDs are negative (e.g. -7); tested --collectorIds -7 returned 0 (no websites on that collector); website response has a 'collectors' array not a single collectorId field (verified)"
  key_fields:
    id:       integer
    name:     string
    domain:   string # hostname or IP being monitored
    groupId:  integer # immediate parent group only — no subgroup traversal server-side
    type:     string # "webcheck" or "pingcheck"
    properties:
      type: array
      items: {name: string, value: string}
      note: "API filter works for specific name/value pairs; empty check must be client-side"
    status:   string
    sdtStatus: string
  filter_patterns:
    - "properties.name:foo,properties.value:bar  # sites with a specific property set"
    - "groupId:<id>  # sites in an exact group (not subgroups)"
  gotchas:
    - "groupId is exact match only — to query a hierarchy, collect all child group
      IDs first via WebsiteGroupList then filter client-side"
    - "properties being empty vs missing a specific key are different problems:
      empty uses jq select(.properties | length == 0);
      missing key uses jq array subtraction ($required - $present)"

WebsiteGroupList:
  path: /website/groups
  key_fields:
    id:                  integer
    name:                string
    fullPath:            string # full slash-separated path e.g. acme/customer/acme
    parentId:            integer
    numOfDirectSubGroups: integer
    numOfDirectWebsites:  integer
    numOfWebsites:        integer # includes all descendant websites
    properties:
      type: array
      items: {name: string, value: string}
  filter_patterns:
    - 'fullPath~"acme/"  # all groups whose path contains acme/ (catches all depths)'
  gotchas:
    - "fullPath~ with a trailing slash scopes to children of that group;
      without the slash it also matches the group itself"

# ---
# Devices
# ---
DeviceList:
  path: /device/devices
  unique_options:
    includeDeletedResources: "--includeDeletedResources / --dont-includeDeletedResources — include soft-deleted devices; deletedTimeInMs > 0 on deleted records; default excludes them"
    start:        "--start INTEGER (int64) — purpose unverified; co-occurs with netflowFilter on all netflow-capable endpoints; no visible effect on DeviceList in testing"
    end:          "--end INTEGER (int64) — same caveat as start"
    netflowFilter: "--netflowFilter TEXT — co-occurs with start/end on netflow endpoints; no visible effect on DeviceList in testing; LM swagger has no description"
  gotchas:
    - "-f/--fields may be ignored for some device types (e.g. deviceType:18 synthetic checks return full schema regardless of -f)"
  key_fields:
    id:           integer
    name:         string # hostname or IP
    displayName:  string # friendly name shown in UI
    hostGroupIds: string # comma-separated list of group IDs — use ~ not : to filter
    systemProperties:
      type: array
      items: {name: string, value: string}
    customProperties:
      type: array
      items: {name: string, value: string}
    autoProperties:
      type: array
      items: {name: string, value: string}
    preferredCollectorGroupName: string
    autoBalancedCollectorGroupId: integer # 0 means not auto-balanced
  os_identification:
    system.sysinfo:
      note: "Full uname string e.g. 'Linux hostname 3.10.0-... x86_64' — reliable for OS type"
      linux_filter: "systemProperties.name:system.sysinfo,systemProperties.value~Linux"
    auto.endpoint.model:
      note: "Auto-discovered device model — also useful for OS/device type identification"
  filter_patterns:
    - "customProperties.name:foo,customProperties.value:bar"
    - "systemProperties.name:system.sysinfo,systemProperties.value~Linux  # Linux devices"
    - "systemProperties.name:system.groups,systemProperties.value~Root/Group/"
    - "hostGroupIds~<id>  # tilde because hostGroupIds is a comma-separated string"
    - "displayName~foo,preferredCollectorGroupName\\!~foo  # ! must be escaped in bash"
  gotchas:
    - "hostGroupIds is a comma-separated string, not an array — use ~ not : to match"
    - "There is no way to effectively filter by effective property (per LM community)"
    - "Device groups (e.g. 'Linux Servers') may contain non-Linux devices — prefer
      system.sysinfo filter over group membership for OS-based queries"

DeviceGroupList:
  path: /device/groups
  key_fields:
    id:       integer
    name:     string
    fullPath: string
    parentId: integer
    customProperties:
      type: array
      items: {name: string, value: string}

# ---
# Datasources
# ---
DatasourceList:
  path: /setting/datasources
  options:
    format: "--format TEXT — LM API format param; do NOT use (see _global gotcha); use elm's global --format flag instead"
  key_fields:
    id:          integer
    name:        string
    displayName: string
    appliesTo:   string # AppliesTo expression — defines which devices get this datasource
    group:       string # datasource group/category
    collectMethod: string
    technology:  string
  filter_patterns:
    - "name:NTPv4  # exact name match — use : not ~ when you know the exact name;
      avoids retrieving all 1000+ datasources"

AssociatedDeviceListByDataSourceId:
  path: /setting/datasources/{id}/devices
  required_params:
    id: integer # datasource ID
  note: "Returns all devices that have this datasource applied — useful for inverting
    (devices that do NOT have a datasource) by comparing against DeviceList"
  key_fields:
    id:          integer
    name:        string
    displayName: string
  pattern_devices_without_datasource: |
    # Step 1: find datasource ID
    elm DatasourceList -s0 -f id -F name:NTPv4

    # Step 2: get IDs of devices that DO have it
    ntp_ids=$(elm AssociatedDeviceListByDataSourceId --id <id> -f id | jq '[.AssociatedDeviceListByDataSourceId[].id]')

    # Step 3: get all target devices and exclude the ones that have it
    elm DeviceList -s0 -f id,displayName -F systemProperties.name:system.sysinfo,systemProperties.value~Linux | \
      jq -r --argjson ntp_ids "$ntp_ids" \
        '.DeviceList[] | select(.id as $id | $ntp_ids | contains([$id]) | not) | .displayName' | sort

# ---
# Users / Roles / Tokens
# ---
AdminList:
  path: /setting/admins
  unique_options:
    type:              "--type TEXT — silently ignored by LM API; field in response is userType with values 'Local', 'SAML', 'API only' (verified); use -F filter instead: -F userType:SAML"
    permission:        "--permission TEXT — no visible effect observed; values unverified"
    filterGroupString: "--filterGroupString TEXT — filters by adminGroupId; e.g. --filterGroupString 1 returns users in group 1 (verified)"
  key_fields:
    id:           integer
    username:     string
    userType:     string  # "Local", "SAML", "API only" (verified)
    twoFAEnabled: boolean
    adminGroupIds: array   # list of group IDs the user belongs to
    roles:        array    # list of role objects with id, name, privileges

ApiTokenList:
  path: /setting/admins/apitokens
  unique_options:
    type:       "--type TEXT — values unverified; 'lmv1' and 'bearer' both return no results (verified); field may not exist in response"
    permission: "--permission TEXT — 'readonly' and 'readwrite' both return the same results (verified); does not appear to filter"
  key_fields:
    adminId:    integer # owning user ID
    adminName:  string  # owning username
    id:         integer # token ID
    accessId:   string
    status:     integer # 1=disabled, 2=active (verified via testing)
    note:       string
    roles:      array   # list of role names the token owner has
    createdOn:  integer # epoch seconds
    createdBy:  string
    lastUsedOn: integer # epoch seconds
    lastAuthIp: string

RoleList:
  path: /setting/roles
  unique_options:
    excludeAdmin: "--excludeAdmin / --dont-excludeAdmin — removes 1 built-in admin role from results (43 → 42 verified); default (no flag) includes it"

AccessGroupList:
  path: /setting/accessgroup
  note: "Returns 400 Bad Request (verified). Endpoint may require additional params or may not be available on this account type."

AppliesToFunctionList:
  path: /setting/functions
  note: "Standard list; verified working. Returns AppliesTo function definitions."
  key_fields:
    id:         integer
    name:       string   # e.g. "isMisc", "isNetwork", "isStorage", "isLinux"
    appliesTo:  string   # the function body (AppliesTo expression)

AlertRuleList:
  path: /setting/alert/rules
  note: "Standard list; verified working."
  key_fields:
    id:                integer
    name:              string
    priority:          integer
    levelStr:          string   # e.g. "All"
    devices:           array
    deviceGroups:      array
    datasource:        string
    instance:          string
    datapoint:         string
    escalationInterval: integer
    escalatingChainId: integer
    escalatingChain:   object
    suppressAlertClear: boolean
    suppressAlertAckSdt: boolean
    resourceProperties: array
    sendAnomalySuppressedAlert: boolean

EscalationChainList:
  path: /setting/alert/chains
  note: "Standard list; verified working."
  key_fields:
    id:                integer
    name:              string
    description:       string
    enableThrottling:  boolean
    throttlingPeriod:  integer
    throttlingAlerts:  integer
    inAlerting:        boolean
    destinations:      array   # list of escalation stages
    ccDestinations:    array

RecipientGroupList:
  path: /setting/recipientgroups
  note: "Standard list; verified working. Name field is groupName not name."
  key_fields:
    id:          integer
    groupName:   string   # NOTE: field is groupName not name — -f name will return empty
    description: string
    recipients:  array
  gotchas:
    - "Name field is 'groupName', not 'name' — use -f id,groupName not -f id,name"

IntegrationList:
  path: /setting/integrations
  note: "Standard list; verified working. Very wide response — use -f to limit fields."
  key_fields:
    id:     integer
    name:   string
    type:   string   # e.g. "servicenow", "http"

NetscanList:
  path: /setting/netscans
  note: "Standard list; verified working."
  key_fields:
    id:          integer
    name:        string
    collectorId: integer

OpsNoteList:
  path: /setting/opsnotes
  note: "Standard list; verified working. id is a string not integer."
  key_fields:
    id:           string   # string ID (e.g. "JuyolHMaTxKxnrkNYl9o1Q"), not integer
    note:         string
    happenOnInSec: integer  # epoch seconds
    createdBy:    string
    scopes:       array    # list of {type, deviceId, deviceName, groupId, fullPath}
    tags:         array

UnmonitoredDeviceList:
  path: /device/unmonitoreddevices
  note: "Returns 403 Forbidden with read-only token (verified). May require admin token."

LogAlertGroupsList:
  path: /logpipelines
  note: "Standard list (-s/-o/-F/-f all work). Returns log alert pipeline definitions. id is a string."
  key_fields:
    id:          string   # string ID (e.g. "1", "2") — not integer
    name:        string
    query:       string   # LM log pipeline query expression
    description: string
  gotchas:
    - "id is a string, not integer — note when using with LogAlertGroupById (--pipelineId)"

LogQueryGroupList:
  path: /log/logquerygroups
  note: "Standard list (-s/-o/-F/-f all work). Returns log query group definitions."
  key_fields:
    id:           integer
    name:         string
    description:  string
    groupType:    string   # "PRIVATE" or "PUBLIC"
    ownerId:      integer  # 0 for system-owned
    parentId:     integer
    logQueries:   array    # list of log queries in this group (may be empty list in list view, null in ById)
    userPermission: string # "WRITE", "READ", etc.
  gotchas:
    - "logQueries is empty list in LogQueryGroupList but null in LogQueryGroupById (inconsistent)"

TrackedQueryGroupList:
  path: /trackedquerygroups
  note: "Standard list (-s/-o/-F/-f all work). Returns tracked query group definitions."
  key_fields:
    id:           integer
    name:         string   # e.g. "Ungrouped"
    description:  string
    ownerId:      integer
    parentId:     integer
    trackedQuery: object   # null if no tracked query associated

TopologySourceList:
  path: /setting/topologysources
  note: "Standard list (-s/-o/-F/-f all work). Returns topology source definitions."
  key_fields:
    id:               integer
    name:             string
    group:            string
    appliesTo:        string
    collectInterval:  integer
    collectionMethod: string
    checksum:         string

DiagnosticSourcesList:
  path: /setting/diagnosticsources
  note: "Standard list (-s/-o/-F/-f all work). Returns no data on this account (none configured)."

RemediationSourcesList:
  path: /setting/remediationsources
  note: "Standard list (-s/-o/-F/-f all work). Returns no data on this account (none configured)."

OIDList:
  path: /setting/oids
  note: "Standard list (-s/-o/-F/-f all work). Returns SNMP OID category definitions."
  key_fields:
    id:         integer
    oid:        string     # regex pattern e.g. "\\.1\\.3\\.6\\.1\\.4\\.1\\.8072"
    categories: string     # comma-separated category names e.g. "Netsnmp, snmp, snmpHR"
    checksum:   string
    lineageId:  string

# ---
# Audit / Logs
# ---
AuditLogList:
  path: /setting/accesslogs
  unique_options:
    format: "--format TEXT — LM API format param; DO NOT USE — causes JSONDecodeError when set to csv (API returns raw CSV that elm cannot parse); use elm's global --format flag instead"
  gotchas:
    - "username field contains the raw access_id string from the calling integration.
      If you see username: \"(update)\", that is literally the access_id someone configured
      — LM does not substitute or redact deleted tokens. Use the ip field and description
      to identify the source:
        elm AuditLogList -F 'username:(update)' -s0"
    - "NOT operators (!: and !~) are silently broken on this endpoint — elm constructs
      and sends the correct URL but the API returns results from an unexpected time window
      rather than applying the exclusion. Use positive operators (: and ~) and filter
      client-side with jq for exclusions:
        elm -f json AuditLogList -s0 | jq '.AuditLogList[] | select(.username != \"foo\")'"
    - "Max 1000 records. Without a filter you get the 1000 most recent; with a positive
      filter (~, :) you get up to 1000 matching records from the full history."
  key_fields:
    id:             integer
    username:       string
    ip:             string
    description:    string
    happenedOn:     integer # epoch seconds
    happenedOnLocal: string # human-readable local time string

# ---
# Device-scoped commands (require --deviceId or similar)
# ---
DeviceDatasourceList:
  path: /device/devices/{deviceId}/devicedatasources
  required_params:
    deviceId: integer # device ID
  key_fields:
    id:          integer # device-datasource ID (hdsId for sub-commands)
    dataSourceId: integer
    dataSourceName: string
    instanceNumber: integer
    alertStatus: string # "none", "warn", "error", "critical"

DeviceDatasourceInstanceList:
  path: /device/devices/{deviceId}/devicedatasources/{hdsId}/instances
  required_params:
    deviceId: integer
    hdsId:    integer # device-datasource ID (id from DeviceDatasourceList)
  key_fields:
    id:           integer
    name:         string
    displayName:  string
    alertStatus:  string
    stopMonitoring: boolean
    lastCollectedTime: integer # epoch seconds; unreliable for some collection types — do NOT use as proxy for "not collecting"

DeviceDatasourceInstanceGroupList:
  path: /device/devices/{deviceId}/devicedatasources/{deviceDsId}/instancegroups
  required_params:
    deviceId:   integer
  optional_params:
    deviceDsId: "--deviceDsId INTEGER — device-datasource ID; scopes to a specific datasource's instance groups"

DeviceEventsourceList:
  path: /device/devices/{deviceId}/deviceeventsources
  required_params:
    deviceId: integer
  note: "Standard list (-s/-o/-F/-f all work). Returns event sources applied to a device."

DevicePropertyList:
  path: /device/devices/{deviceId}/properties
  required_params:
    deviceId: integer
  key_fields:
    name:        string
    value:       string
    type:        string  # "system", "auto", "custom", "inherited"
    inheritList: array   # empty for non-inherited; list of sources for inherited properties
  note: "Returns all property types mixed together — filter by type if needed."

DevicePropertyByName:
  path: /device/devices/{deviceId}/properties/{name}
  required_params:
    deviceId: integer
    name:     string
  note: "Returns single property by exact name. 404 if property does not exist. Verified: --name system.hostname, --name system.ips."

DeviceInstanceList:
  path: /device/devices/{id}/instances
  required_params:
    id: integer # device ID — uses --id not --deviceId (verified)
  unique_options:
    start:        "--start INTEGER (int64) — netflow time range start; same caveat as DeviceList"
    end:          "--end INTEGER (int64) — netflow time range end"
    netflowFilter: "--netflowFilter TEXT — netflow filter; same caveat as DeviceList"
  key_fields:
    id:                  integer
    name:                string   # datasource-instance name e.g. "SNMP_Filesystem_Status-/"
    displayName:         string   # human label e.g. "/"
    dataSourceId:        integer
    deviceDataSourceId:  integer  # hdsId
    groupId:             integer
    deviceId:            integer
    alertStatus:         string
    stopMonitoring:      boolean
