    collectorId:         integer
    collectorDescription: string
    collectorBuild:      string
    collectorPlatform:   string
    eCode:               integer  # 4=restart, 8=info/lifecycle event
    eventMsg:            string   # e.g. "Agent successfully restarted.", "Credential is rotated. Agent will restart."
    reportedOn:          integer  # epoch seconds
    reportDateOnLocal:   string
  gotchas:
    - "id is a string, not an integer — can't filter numerically"
    - "eCode 4 = agent restart; eCode 8 = sbproxy/health/lifecycle info"

