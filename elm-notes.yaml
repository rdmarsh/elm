  key_fields:
    id:     integer
    name:   string
    type:   string   # e.g. "http", "email", "servicenow", "msTeams", "slack-2", "connectwise-2"
  gotchas:
    - "The LM /setting/integrations endpoint only honours -f/--fields for GENERIC
      integration types (http, email) — for BRANDED types (servicenow, msTeams,
      slack-2, connectwise-2, ...) it ignores fields and returns the full ~100+
      field object. Projection is per-record, so one API response can mix trimmed
      and full records by type. elm works around this transparently: after receiving
      the response it trims every item to exactly the requested fields, so -f always
      produces consistent output regardless of integration type (upstream bug #52,
      fixed client-side in engine.py.j2). Confirmed type-correlated across three
      portals 2026-06-11."

