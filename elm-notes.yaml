# elm-notes.yaml
# Hand-curated notes on elm command behaviour, response fields, and filter patterns.
# Supplements the swagger — focuses on what the swagger doesn't tell you:
# real response structure, what filters actually work, and gotchas.
#
# WARNING: This file is partially AI-assisted and may contain inaccuracies.
# Entries should be verified against the live API before being relied upon.
# Correct errors in place and remove this warning from individual entries once verified.

# ---
# Output formats
# ---
# Global flag: elm -f <format> <command>
# Verified against: elm -f <fmt> DeviceGroupList -s2 -f id,name
_formats:
  csv:
    description: Comma-separated values with header row
    pipeable: true
    example: "id,name\n1,foo\n2,bar"

  json:
    description: Compact JSON wrapped in command name key
    pipeable: true  # pipe to jq
    example: '{"DeviceGroupList": [{"id": 1, "name": "foo"}]}'

  prettyjson:
    description: Indented colour-highlighted JSON (uses pygments) — same structure as json
    pipeable: true  # colours may interfere; use json for clean piping
    example: "indented + syntax highlighted"

  tab:
    description: Tabulate 'simple' format — headers + separator line + aligned columns
    pipeable: false
    note: "Identical output to md"

  md:
    description: Tabulate 'simple' format — same as tab
    pipeable: false
    note: "Identical output to tab — may be a bug or historical alias"

  txt:
    description: Plain text — headers + aligned columns, no separator line under headers
    pipeable: false

  gfm:
    description: GitHub Flavored Markdown table — pipe-delimited with header separator
    pipeable: false
    example: "| id | name |\n|---|---|\n| 1 | foo |"

  pipe:
    description: Markdown pipe table — like gfm but with right-aligned numbers and left-aligned strings
    pipeable: false

  jira:
    description: Jira wiki markup table
    pipeable: false
    example: "|| id || name ||\n| 1 | foo |"

  html:
    description: Minified HTML table
    pipeable: false

  prettyhtml:
    description: Syntax-highlighted HTML (uses pygments) — for terminal display only
    pipeable: false

  xml:
    description: Compact XML — includes a row index field
    pipeable: false
    note: "Adds an <index> element per row that is not in the source data"

  prettyxml:
    description: Indented XML — same structure as xml
    pipeable: false

  latex:
    description: LaTeX tabular environment
    pipeable: false

  rst:
    description: reStructuredText grid table
    pipeable: false

  raw:
    description: Python dict repr — NOT JSON, cannot pipe to jq
    pipeable: false
    note: "Output is a Python list of dicts e.g. [{'id': 1, 'name': 'foo'}] — not valid JSON"

  api:
    description: Makes the request, then prints the URL and Authorization header instead of the response data
    pipeable: false
    note: "Authorization header contains the HMAC signature — sensitive, do not share output
      or commit it to version control. The header is time-stamped (epoch ms in the third
      colon-separated field) and expires within minutes — run curl immediately after elm -f api.
      The request IS made; response.url is used for the URL output."
    use_for: "Debug exactly what API call elm made, or replay it with curl"
    example: |
      curl -H "Authorization: LMv1 ..." "https://acme.logicmonitor.com/santaba/rest/..."

# ---
# Global notes (apply to all commands)
# ---
_global:
  gotchas:
    - "Never use 2>&1 when piping elm output to jq — elm warnings go to stderr and
      will corrupt the JSON stream causing jq parse errors"
    - "API filter does not support OR across multiple values for the same field —
      use jq client-side for that"
    - "Array fields cannot be filtered for emptiness server-side (no 'is empty'
      operator) — use jq: select(.field | length == 0)"
    - "-s0 means return all records (up to 1000), not zero records"
    - "validate_filter() wraps values in double quotes automatically — do not
      double-quote values in shell, it causes doubling"

# ---
# Websites
# ---
WebsiteList:
  path: /website/websites
  key_fields:
    id:       integer
    name:     string
    domain:   string # hostname or IP being monitored
    groupId:  integer # immediate parent group only — no subgroup traversal server-side
    type:     string # "webcheck" or "pingcheck"
    properties:
      type: array
      items: {name: string, value: string}
      note: "API filter works for specific name/value pairs; empty check must be client-side"
    status:   string
    sdtStatus: string
  filter_patterns:
    - "properties.name:foo,properties.value:bar  # sites with a specific property set"
    - "groupId:<id>  # sites in an exact group (not subgroups)"
  gotchas:
    - "groupId is exact match only — to query a hierarchy, collect all child group
      IDs first via WebsiteGroupList then filter client-side"
    - "properties being empty vs missing a specific key are different problems:
      empty uses jq select(.properties | length == 0);
      missing key uses jq array subtraction ($required - $present)"

WebsiteGroupList:
  path: /website/groups
  key_fields:
    id:                  integer
    name:                string
    fullPath:            string # full slash-separated path e.g. acme/customer/acme
    parentId:            integer
    numOfDirectSubGroups: integer
    numOfDirectWebsites:  integer
    numOfWebsites:        integer # includes all descendant websites
    properties:
      type: array
      items: {name: string, value: string}
  filter_patterns:
    - 'fullPath~"acme/"  # all groups whose path contains acme/ (catches all depths)'
  gotchas:
    - "fullPath~ with a trailing slash scopes to children of that group;
      without the slash it also matches the group itself"

# ---
# Devices
# ---
DeviceList:
  path: /device/devices
  key_fields:
    id:           integer
    name:         string # hostname or IP
    displayName:  string # friendly name shown in UI
    hostGroupIds: string # comma-separated list of group IDs — use ~ not : to filter
    systemProperties:
      type: array
      items: {name: string, value: string}
    customProperties:
      type: array
      items: {name: string, value: string}
    autoProperties:
      type: array
      items: {name: string, value: string}
    preferredCollectorGroupName: string
    autoBalancedCollectorGroupId: integer # 0 means not auto-balanced
  os_identification:
    system.sysinfo:
      note: "Full uname string e.g. 'Linux hostname 3.10.0-... x86_64' — reliable for OS type"
      linux_filter: "systemProperties.name:system.sysinfo,systemProperties.value~Linux"
    auto.endpoint.model:
      note: "Auto-discovered device model — also useful for OS/device type identification"
  filter_patterns:
    - "customProperties.name:foo,customProperties.value:bar"
    - "systemProperties.name:system.sysinfo,systemProperties.value~Linux  # Linux devices"
    - "systemProperties.name:system.groups,systemProperties.value~Root/Group/"
    - "hostGroupIds~<id>  # tilde because hostGroupIds is a comma-separated string"
    - "displayName~foo,preferredCollectorGroupName\\!~foo  # ! must be escaped in bash"
  gotchas:
    - "hostGroupIds is a comma-separated string, not an array — use ~ not : to match"
    - "There is no way to effectively filter by effective property (per LM community)"
    - "Device groups (e.g. 'Linux Servers') may contain non-Linux devices — prefer
      system.sysinfo filter over group membership for OS-based queries"

DeviceGroupList:
  path: /device/groups
  key_fields:
    id:       integer
    name:     string
    fullPath: string
    parentId: integer
    customProperties:
      type: array
      items: {name: string, value: string}

# ---
# Datasources
# ---
DatasourceList:
  path: /setting/datasources
  key_fields:
    id:          integer
    name:        string
    displayName: string
    appliesTo:   string # AppliesTo expression — defines which devices get this datasource
    group:       string # datasource group/category
    collectMethod: string
    technology:  string
  # TODO: verify which fields are reliably filterable

DatasourceList:
  filter_patterns:
    - "name:NTPv4  # exact name match — use : not ~ when you know the exact name;
      avoids retrieving all 1000+ datasources"

AssociatedDeviceListByDataSourceId:
  path: /setting/datasources/{id}/devices
  required_params:
    id: integer # datasource ID
  note: "Returns all devices that have this datasource applied — useful for inverting
    (devices that do NOT have a datasource) by comparing against DeviceList"
  key_fields:
    id:          integer
    name:        string
    displayName: string
  pattern_devices_without_datasource: |
    # Step 1: find datasource ID
    elm DatasourceList -s0 -f id -F name:NTPv4

    # Step 2: get IDs of devices that DO have it
    ntp_ids=$(elm AssociatedDeviceListByDataSourceId --id <id> -f id | jq '[.AssociatedDeviceListByDataSourceId[].id]')

    # Step 3: get all target devices and exclude the ones that have it
    elm DeviceList -s0 -f id,displayName -F systemProperties.name:system.sysinfo,systemProperties.value~Linux | \
      jq -r --argjson ntp_ids "$ntp_ids" \
        '.DeviceList[] | select(.id as $id | $ntp_ids | contains([$id]) | not) | .displayName' | sort
