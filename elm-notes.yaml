DeviceConfigSourceConfigById:
  path: /device/devices/{deviceId}/devicedatasources/{hdsId}/instances/{instanceId}/config/{id}
  required_params:
    deviceId:   integer
    hdsId:      integer
    instanceId: integer
    id:         string  # config ID is a string
  unique_options:
    format:     "--format TEXT — LM API format param; same gotcha as AuditLogList"
    startEpoch: "--startEpoch INTEGER (int64) — purpose unverified; possibly return config as of this timestamp"

# ---
# Time-series data endpoints
# Pattern: require device/datasource/instance IDs + optional time range
# ---
_data_endpoint_options:
  note: "Shared options across data/graph endpoints"
  start:      "--start INTEGER (int64 epoch seconds) — time range start; defaults to recent window"
  end:        "--end INTEGER (int64 epoch seconds) — time range end"
  period:     "--period FLOAT — time window in hours; e.g. 1.0 returns ~30 points, 24.0 returns ~500 points (verified on DeviceDatasourceInstanceData)"
  datapoints: "--datapoints TEXT — comma-separated datapoint names; filters response to only those datapoints (verified)"
  aggregate:  |
    --aggregate TEXT — verified valid values (on DeviceDatasourceDataById):
      none     = full time series (~30 points, same as omitting the flag)
      first    = single oldest point in the window
      last     = single most recent point
      average  = single mean of all points in the window
      sum      = single sum of all points in the window
    Invalid (API error or empty): avg, mean, median, count, min, max
  format:     "--format TEXT — LM API format param; same gotcha as AuditLogList"
  time_note:  "time values in responses are epoch MILLISECONDS, not seconds — divide by 1000 for epoch seconds (verified)"

DeviceDatasourceDataById:
  path: /device/devices/{deviceId}/devicedatasources/{id}/data
  required_params:
    deviceId: integer
    id:       integer  # device-datasource ID (hdsId from DeviceDatasourceList)
  unique_options: "start, end, period, datapoints, format, aggregate — see _data_endpoint_options"
  note: "Returns data for ALL instances of a datasource (unlike DeviceDatasourceInstanceData which is one instance). Instances are keyed by name under 'instances' dict."
  response_structure:
    dataSourceName: string
    dataPoints:     "list of datapoint name strings"
    instances:      "dict keyed by instance name (e.g. 'DS-enp3s0f0 [ID:2]') → {values: [[...]], time: [epoch_ms]}"
    nextPageParams: "pagination cursor"

DeviceDatasourceInstanceData:
  path: /device/devices/{deviceId}/devicedatasources/{hdsId}/instances/{id}/data
  required_params:
    deviceId: integer
    hdsId:    integer
    id:       integer  # instance ID
  unique_options: "start, end, period, datapoints, format — see _data_endpoint_options"
  response_structure:
    dataSourceName: string
    dataPoints:     "list of datapoint name strings (column headers)"
    values:         "list of arrays — each array is one time interval, values in same order as dataPoints; 'No Data' string used for missing values"
    time:           "list of epoch MILLISECONDS (not seconds) — newest first"
    nextPageParams: "pagination cursor; empty string when no more pages"
  notes:
    - "--datapoints InMbps,OutMbps filters to just those datapoints — values array shrinks to match (verified)"
    - "--period 1.0 returns ~30 points (1 hour window); --period 24.0 returns ~500 points (24 hours) — period is hours (verified)"
    - "time values are epoch ms — divide by 1000 for epoch seconds"

DeviceDatasourceInstanceGraphData:
  path: /device/devices/{deviceId}/devicedatasources/{hdsId}/instances/{id}/graphs/{graphId}/data
  required_params:
    deviceId: integer
    hdsId:    integer
    id:       integer  # instance ID
    graphId:  integer  # use 1 to get first graph; get graph IDs via DataSourceOverviewGraphList --dsId
  unique_options: "start, end, format — see _data_endpoint_options"
  note: "Returns rendered graph data (not raw values). graphId=1 returns the first graph for the instance."
  response_structure:
    type, id, name, title: "graph metadata"
    lines:       "array of line objects; each has legend, color, data (array of values or 'No Data'), min, max, avg, std"
    timestamps:  "array of epoch ms (24h window by default, ~700 points)"
    startTime, endTime: "epoch ms — window bounds"
    timeZone, timeZoneId: "e.g. AEDT / Australia/Sydney"
    exportFileName: "suggested filename if exporting"
    scopes:      "array of {type, id} — devices this graph covers"

DeviceDatasourceInstanceGroupOverviewGraphData:
  path: /device/devices/{deviceId}/devicedatasources/{deviceDsId}/groups/{dsigId}/graphs/{ographId}/data
  required_params:
    deviceId:  integer
    deviceDsId: integer
    dsigId:    integer
    ographId:  integer
  unique_options: "start, end, format — see _data_endpoint_options"

DeviceInstanceGraphDataOnlyByInstanceId:
  path: /device/devicedatasourceinstances/{instanceId}/graphs/{graphId}/data
  required_params:
    instanceId: integer
    graphId:    integer
  note: "Shortcut — doesn't require deviceId/hdsId, just the instance ID directly. Verified: --instanceId 423232578 --graphId 1 returns full graph data."
  unique_options: "start, end, format — see _data_endpoint_options"

WebsiteCheckpointDataById:
  path: /website/websites/{srvId}/checkpoints/{checkId}/data
  required_params:
    srvId:   integer  # website ID
    checkId: integer  # checkpoint ID; get from WebsiteById response (.checkpoints[].id)
  unique_options: "start, end, period, datapoints, format, aggregate — see _data_endpoint_options"
  note: "Verified working: --srvId 2 --checkId 354175036. Checkpoint IDs are in WebsiteById response (.checkpoints[].id), not from SiteMonitorCheckPointList. dataPoints includes overallStatus, totalSmCount, failSmCount, sslDaysUntilExpiration, etc. time is epoch ms."

WebsiteDataByGraphName:
  path: /website/websites/{id}/graphs/{graphName}/data
  required_params:
    id:        integer
    graphName: string  # graph name; tested 'response' → 400; valid values unknown
  unique_options: "start, end, format — see _data_endpoint_options"
  note: "Returns 400 Bad Request for graphName='response' on website 2 — valid graphName values are not documented and may be website-type-specific."

WebsiteGraphData:
  path: /website/websites/{websiteId}/checkpoints/{checkpointId}/graphs/{graphName}/data
  required_params:
    websiteId:    integer
    checkpointId: integer
    graphName:    string  # tested 'response', 'availability' → both 400; valid values unknown
  unique_options: "start, end, format — see _data_endpoint_options"
  note: "Returns 400 Bad Request for all graphName values tested — valid values unknown."

WidgetDataById:
  path: /dashboard/widgets/{id}/data
  required_params:
    id: integer
  unique_options: "start, end, format — see _data_endpoint_options"
  note: "Verified working — returns widget-specific data structure (varies by widget type)."

TopTalkersGraph:
  path: /device/devices/{id}/topTalkersGraph
  required_params:
    id: integer  # device ID
  unique_options:
    start:         "--start INTEGER (int64) — time range start (netflow)"
    end:           "--end INTEGER (int64) — time range end (netflow)"
    netflowFilter: "--netflowFilter TEXT — netflow filter"
    format:        "--format TEXT — LM API format param; same gotcha as AuditLogList"
    keyword:       "--keyword TEXT — purpose unverified; possibly filter for top talker search"
  note: "Netflow-specific — requires netflow to be enabled and configured on the device"

# ---
# Delta devices (incremental sync)
# ---
DeltaIdWithDevices:
  path: /device/devices/delta
  note: "No -s/--size option (verified). Returns full device snapshot. The deltaId is in the response root (not per-item) — elm surfaces only the items array, so deltaId is not accessible via elm. Use direct API call to retrieve it."
  unique_options:
    deltaId: "--deltaId TEXT — if provided, returns changes since that deltaId; if omitted, returns full snapshot with new deltaId"
  gotchas:
    - "No -s option — returns all devices; can be large"
    - "deltaId is in response root, not per-item — not accessible via elm; need direct API call"
    - "API returns 400 'number of active delta requests have already reached the max allowed limit' if concurrent delta sessions are open — one session at a time"

DeltaDevices:
  path: /device/devices/delta/{deltaId}
  required_params:
    deltaId: string  # from a previous DeltaIdWithDevices call
  note: "Untested — requires a valid deltaId from DeltaIdWithDevices, which elm doesn't surface. Use direct API access to get the deltaId first."

